  <style>
    :root {
      --sage: #75806a;
      --sage-dark: #626b59;
      --blue: #9bb5bd;
      --green: #5f8a63;
      --ink: #6f7563;
      --soft: #f7f7f2;
      --line: #d9ddd2;
      --wa: #25D366;
      --snap: #FFFC00;
      --tiktok: #000000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(155,181,189,.22), transparent 28%),
        radial-gradient(circle at top right, rgba(117,128,106,.18), transparent 25%),
        #f8f8f3;
      color: var(--ink);
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #fffefb;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 55px rgba(0,0,0,.08);
    }

    .top {
      padding: 30px 22px 18px;
      text-align: center;
      position: relative;
    }

    .logo {
      width: 235px;
      max-width: 80%;
      margin: 0 auto 10px;
      display: block;
    }

    h1 {
      margin: 8px 0;
      font-size: 30px;
      color: var(--sage-dark);
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 6px 0 12px;
      color: var(--sage);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 58px;
      height: 1px;
      background: var(--sage);
      opacity: .65;
    }

    .tagline {
      margin: 0;
      font-size: 17px;
      color: #79806e;
      font-weight: 700;
    }

      background-size: cover;
      background-position: center;
      box-shadow: 0 12px 25px rgba(0,0,0,.08);
    }

    .content {
      padding: 0 28px 26px;
    }

    .big-btn {
      min-height: 82px;
      border-radius: 17px;
      margin: 12px 0;
      color: white;
      text-decoration: none;
      display: grid;
      grid-template-columns: 62px 1fr 30px;
      align-items: center;
      padding: 12px 16px;
      box-shadow: 0 10px 22px rgba(0,0,0,.08);
      transition: transform .15s ease, filter .15s ease;
    }

    .big-btn:active {
      transform: scale(.98);
      filter: brightness(.96);
    }

    .btn-menu { background: linear-gradient(135deg, #6f7865, #879178); }
    .btn-map { background: linear-gradient(135deg, #8cafba, #a9c3ca); }
    .btn-wa { background: linear-gradient(135deg, #25D366, #128C7E); }

    .icon {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: .96;
      font-size: 38px;
      color: #fff;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      stroke: white;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-text {
      text-align: center;
      line-height: 1.45;
    }

    .btn-text strong {
      display: block;
      font-size: 22px;
      margin-bottom: 2px;
    }

    .btn-text span {
      display: block;
      font-size: 15px;
      opacity: .92;
    }

    .arrow {
      font-size: 36px;
      line-height: 1;
      opacity: .9;
      transform: rotate(180deg);
    }

    .small-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 11px;
      margin: 16px 0 18px;
    }

    .small {
      height: 88px;
      border: 1px solid var(--line);
      border-radius: 17px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 5px 14px rgba(0,0,0,.035);
      transition: transform .2s ease, box-shadow .2s ease;
      overflow: hidden;
    }

    .small:active {
      transform: scale(.97);
    }

    .small i {
      font-size: 34px;
      line-height: 1;
    }

    .small span {
      font-size: 12px;
      font-weight: 900;
    }

    .call {
      background: #ffffff;
      color: var(--sage-dark);
    }

    .call i {
      color: var(--sage);
    }

    .instagram {
      color: #fff;
      background:
        radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
    }

    .whatsapp {
      background: #25D366;
      color: #fff;
    }

    .tiktok {
      background: #000;
      color: #fff;
      position: relative;
    }

    .tiktok i {
      text-shadow: -2px -1px 0 #25F4EE, 2px 1px 0 #FE2C55;
    }

    .snapchat {
      background: #FFFC00;
      color: #000;
    }

    .hours {
      margin-top: 12px;
      border-radius: 19px;
      padding: 18px 16px 20px;
      background: linear-gradient(135deg, rgba(155,181,189,.22), rgba(255,255,255,.96));
      border: 1px solid #e2e6e0;
    }

    .hours-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 24px;
      font-weight: 900;
      color: var(--sage-dark);
      margin-bottom: 18px;
    }

    .clock {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--blue);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .hours-row {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      align-items: stretch;
      gap: 14px;
    }

    .vline { background: #cdd3ca; }

    .day-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 100px;
    }

    .day-box i {
      font-size: 32px;
      color: var(--sage);
    }

    .day {
      font-weight: 900;
      font-size: 17px;
    }

    .time {
      font-weight: 700;
      font-size: 15px;
      line-height: 1.55;
      color: #777d6d;
    }

    .footer {
      margin-top: 30px;
      padding: 25px 20px 28px;
      background: var(--sage);
      color: white;
      text-align: center;
      border-radius: 55% 55% 0 0 / 20% 20% 0 0;
    }

    .footer strong {
      display: block;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .footer span {
      font-size: 18px;
      opacity: .94;
    }

    @media (max-width: 370px) {
      h1 { font-size: 26px; }
      .content { padding: 0 18px 22px; }
      .small-grid { gap: 7px; }
      .small span { font-size: 11px; }
      .big-btn {
        grid-template-columns: 48px 1fr 22px;
        padding: 10px 12px;
      }
      .btn-text strong { font-size: 19px; }
    }
  </style>
</head>

<body>
  <main class="page">
